<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon mark -->
  <g transform="translate(200, 145)">
    <rect x="-56" y="-56" width="112" height="112" rx="24" fill="#4338ca"/>
    <rect x="-56" y="-56" width="112" height="112" rx="24" fill="url(#shimmer)" opacity="0.15"/>
    <defs>
      <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#a5b4fc"/>
        <stop offset="100%" stop-color="#312e81"/>
      </linearGradient>
    </defs>
    <!-- Lightning bolt -->
    <g transform="translate(-2, 2)">
      <polygon points="-8,-38 12,-38 2,-8 18,-8 -12,40 -4,6 -20,6" fill="#ffffff" opacity="0.95"/>
      <polygon points="-8,-38 12,-38 2,-8 18,-8 -12,40 -4,6 -20,6" fill="none" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="200" y="260" text-anchor="middle" font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#4338ca">Audit</tspan><tspan fill="#1e1b3a">Zap</tspan>
  </text>
  <!-- Tagline -->
  <text x="200" y="288" text-anchor="middle" font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#5c5a7a">AI-POWERED AUDITS</text>
</svg>
